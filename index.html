<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book of ANSWERS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1f;
            --surface: #23232a;
            --text: #e0d8cc;
            --text-light: #c4b9a6;
            --gold: #c9a84c;
            --gold-bright: #e0c46d;
            --gold-dim: #a08030;
            --leather-dark: #3b2210;
            --leather: #5c3a1e;
            --leather-light: #7a4f2e;
            --leather-highlight: #8b5e3c;
            --page: #f4ecdc;
            --page-edge: #d9ceb5;
            --page-shadow: #c4b896;
            --spine-dark: #2a1508;
            --red-accent: #8b1a1a;
            --book-width: 420px;
            --book-height: 560px;
            --book-width-mobile: 300px;
            --book-height-mobile: 400px;
            --book-width-tablet: 360px;
            --book-height-tablet: 480px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at center, #1f1f28 0%, #121218 100%),
                radial-gradient(circle at 50% 30%, rgba(201, 168, 76, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 30% 70%, rgba(139, 26, 26, 0.03) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px;
            font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Subtle floating particles */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            animation: floatUp 8s infinite ease-in;
        }
        .particle:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
            animation-duration: 9s;
        }
        .particle:nth-child(2) {
            left: 25%;
            animation-delay: 2s;
            animation-duration: 7.5s;
        }
        .particle:nth-child(3) {
            left: 40%;
            animation-delay: 4s;
            animation-duration: 8.5s;
        }
        .particle:nth-child(4) {
            left: 55%;
            animation-delay: 1s;
            animation-duration: 10s;
        }
        .particle:nth-child(5) {
            left: 70%;
            animation-delay: 3s;
            animation-duration: 7s;
        }
        .particle:nth-child(6) {
            left: 85%;
            animation-delay: 5s;
            animation-duration: 9.5s;
        }
        .particle:nth-child(7) {
            left: 15%;
            animation-delay: 6s;
            animation-duration: 8s;
        }
        .particle:nth-child(8) {
            left: 50%;
            animation-delay: 3.5s;
            animation-duration: 11s;
        }
        .particle:nth-child(9) {
            left: 75%;
            animation-delay: 1.5s;
            animation-duration: 7.8s;
        }
        .particle:nth-child(10) {
            left: 92%;
            animation-delay: 4.5s;
            animation-duration: 9.2s;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(105vh) scale(0.3);
            }
            5% {
                opacity: 0.7;
            }
            30% {
                opacity: 0.5;
            }
            60% {
                opacity: 0.2;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1.8);
            }
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            gap: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-top: 10px;
            position: relative;
        }
        .header h1 {
            font-family: 'Cinzel Decorative', 'Georgia', serif;
            font-weight: 900;
            font-size: clamp(28px, 5.5vw, 50px);
            letter-spacing: 3px;
            background: linear-gradient(180deg,
                    #f0d878 0%, #c9a84c 25%, #e8c860 40%, #a07828 55%, #d4b850 65%, #f0d878 80%, #8b6518 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 2px 6px rgba(201, 168, 76, 0.5));
            margin: 0;
            line-height: 1.2;
            position: relative;
            display: inline-block;
        }
        .header .subtitle {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-style: italic;
            font-size: clamp(12px, 2vw, 17px);
            color: var(--gold-dim);
            letter-spacing: 2px;
            margin-top: 2px;
            opacity: 0.8;
        }
        .header::after {
            content: '';
            display: block;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 8px auto 0;
        }

        /* Book area */
        .book-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 0;
        }

        /* 3D Scene */
        .book-scene {
            perspective: 1400px;
            perspective-origin: 50% 50%;
            width: var(--book-width);
            height: var(--book-height);
            position: relative;
            transition: transform 0.3s ease;
        }

        /* Book */
        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(-15deg) rotateX(5deg);
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .book.open {
            transform: rotateY(-5deg) rotateX(2deg);
        }

        /* Book spine */
        .book-spine {
            position: absolute;
            left: 48%;
            top: 0;
            width: 4%;
            height: 100%;
            background: linear-gradient(90deg,
                    var(--spine-dark) 0%, #3d1f0a 30%, #5a3015 50%, #3d1f0a 70%, var(--spine-dark) 100%);
            z-index: 30;
            border-radius: 3px;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.6), 2px 0 8px rgba(0, 0, 0, 0.4);
            transform: translateZ(1px);
        }
        .book-spine::after {
            content: '';
            position: absolute;
            top: 5%;
            left: 20%;
            width: 60%;
            height: 90%;
            background: linear-gradient(180deg,
                    transparent 0%, rgba(201, 168, 76, 0.15) 30%, rgba(201, 168, 76, 0.1) 50%, rgba(201, 168, 76, 0.15) 70%, transparent 100%);
            border-radius: 2px;
        }

        /* Back cover */
        .back-cover {
            position: absolute;
            left: 50%;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(160deg, var(--leather-dark) 0%, var(--leather) 20%, var(--leather-light) 45%, var(--leather) 70%, var(--leather-dark) 100%);
            z-index: 1;
            border-radius: 0 6px 6px 0;
            box-shadow: 3px 4px 18px rgba(0, 0, 0, 0.7);
            transform-origin: left center;
            transform: rotateY(0deg);
            border-left: 1px solid #2a1508;
            overflow: hidden;
        }
        .back-cover::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 2px solid rgba(160, 120, 50, 0.25);
            border-radius: 3px;
            pointer-events: none;
        }
        .back-cover::after {
            content: '';
            position: absolute;
            inset: 14px;
            border: 1px solid rgba(160, 120, 50, 0.12);
            border-radius: 2px;
            pointer-events: none;
        }

        /* Front cover */
        .front-cover {
            position: absolute;
            left: 0%;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(155deg,
                    var(--leather-dark) 0%, #4a2810 15%, var(--leather) 30%, #6b4226 48%, var(--leather-light) 55%, #6b4226 62%, var(--leather) 78%, #4a2810 92%, var(--leather-dark) 100%);
            z-index: 40;
            border-radius: 6px 0 0 6px;
            box-shadow: -3px 4px 18px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(90, 50, 25, 0.3);
            transform-origin: right center;
            transform: rotateY(0deg);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
            border-right: 2px solid #2a1508;
            overflow: hidden;
        }
        .front-cover.open {
            transform: rotateY(-175deg);
            box-shadow: 8px 4px 25px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(90, 50, 25, 0.3);
        }
        .front-cover::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 3px solid rgba(180, 140, 60, 0.3);
            border-radius: 4px;
            pointer-events: none;
            z-index: 2;
        }
        .front-cover::after {
            content: '';
            position: absolute;
            inset: 18px;
            border: 1.5px solid rgba(180, 140, 60, 0.15);
            border-radius: 3px;
            pointer-events: none;
            z-index: 2;
        }
        .cover-ornament {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65%;
            height: 55%;
            border: 2px solid rgba(200, 155, 60, 0.35);
            border-radius: 4px;
            z-index: 3;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover-ornament::before {
            content: '◆';
            font-size: 28px;
            color: rgba(200, 155, 60, 0.5);
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--leather);
            padding: 0 8px;
        }
        .cover-ornament::after {
            content: '◆';
            font-size: 28px;
            color: rgba(200, 155, 60, 0.5);
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--leather);
            padding: 0 8px;
        }
        .cover-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel Decorative', 'Georgia', serif;
            font-weight: 700;
            font-size: clamp(11px, 1.5vw, 16px);
            color: rgba(210, 170, 70, 0.7);
            text-align: center;
            letter-spacing: 2px;
            z-index: 4;
            pointer-events: none;
            line-height: 1.4;
        }

        /* Page stack on right */
        .page-stack {
            position: absolute;
            left: 50%;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .page-stack .page-layer {
            position: absolute;
            top: 2px;
            left: 0;
            width: 100%;
            height: calc(100% - 4px);
            background: var(--page);
            border-radius: 0 3px 3px 0;
            transform-origin: left center;
            transform: rotateY(0deg);
            border-left: 1px solid #c4b896;
            box-shadow: 1px 0 3px rgba(0, 0, 0, 0.2);
        }
        .page-stack .page-layer:nth-child(1) {
            z-index: 20;
            left: -1px;
        }
        .page-stack .page-layer:nth-child(2) {
            z-index: 19;
            left: -2px;
            background: #f2ead8;
        }
        .page-stack .page-layer:nth-child(3) {
            z-index: 18;
            left: -3px;
            background: #f0e8d4;
        }
        .page-stack .page-layer:nth-child(4) {
            z-index: 17;
            left: -4px;
            background: #eee6d0;
        }
        .page-stack .page-layer:nth-child(5) {
            z-index: 16;
            left: -5px;
            background: #ece4cc;
        }
        .page-stack .page-layer:nth-child(6) {
            z-index: 15;
            left: -6px;
            background: #eae2c8;
        }
        .page-stack .page-layer:nth-child(7) {
            z-index: 14;
            left: -7px;
            background: #e8e0c4;
        }
        .page-stack .page-layer:nth-child(8) {
            z-index: 13;
            left: -8px;
            background: #e6dec0;
        }

        /* Left side page stack (revealed after flips) */
        .page-stack-left {
            position: absolute;
            left: 0%;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            border-radius: 3px 0 0 3px;
            overflow: hidden;
        }
        .page-stack-left .page-layer-left {
            position: absolute;
            top: 2px;
            right: 0;
            width: 100%;
            height: calc(100% - 4px);
            background: var(--page);
            border-radius: 3px 0 0 3px;
            border-right: 1px solid #c4b896;
            box-shadow: -1px 0 3px rgba(0, 0, 0, 0.15);
        }
        .page-stack-left .page-layer-left:nth-child(1) {
            z-index: 10;
            right: -1px;
        }
        .page-stack-left .page-layer-left:nth-child(2) {
            z-index: 9;
            right: -2px;
            background: #f2ead8;
        }
        .page-stack-left .page-layer-left:nth-child(3) {
            z-index: 8;
            right: -3px;
            background: #f0e8d4;
        }
        .page-stack-left .page-layer-left:nth-child(4) {
            z-index: 7;
            right: -4px;
            background: #eee6d0;
        }

        /* Flipping page element */
        .flipping-page {
            position: absolute;
            left: 50%;
            top: 2px;
            width: 50%;
            height: calc(100% - 4px);
            background: var(--page);
            z-index: 25;
            transform-origin: left center;
            transform: rotateY(0deg);
            transition: transform 0.15s ease-in;
            border-radius: 0 3px 3px 0;
            border-left: 1px solid #c4b896;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .flipping-page.flipped {
            transform: rotateY(-175deg);
            transition: transform 0.12s ease-out;
        }
        .flipping-page.slow-flip {
            transition: transform 0.35s ease-out;
        }
        .flipping-page.very-slow-flip {
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.3, 1);
        }
        .flipping-page .page-content {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(14px, 1.8vw, 18px);
            color: #3a2a15;
            text-align: center;
            padding: 15px;
            font-style: italic;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .flipping-page.show-answer .page-content {
            opacity: 1;
        }
        .flipping-page .page-number {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 10px;
            color: #b8a888;
            font-style: normal;
        }

        /* Answer display area (on the open spread) */
        .answer-display {
            position: absolute;
            left: 5%;
            top: 50%;
            width: 42%;
            transform: translateY(-50%);
            z-index: 3;
            pointer-events: none;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(13px, 1.6vw, 17px);
            color: #3a2a15;
            text-align: center;
            font-style: italic;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 0.5s ease 0.3s;
            padding: 10px;
        }
        .answer-display.visible {
            opacity: 1;
        }

        /* Input area */
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 440px;
            z-index: 10;
            position: relative;
        }
        .question-label {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-style: italic;
            color: var(--text-light);
            font-size: clamp(14px, 2.2vw, 17px);
            letter-spacing: 1px;
            text-align: center;
        }
        .question-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 2px solid rgba(201, 168, 76, 0.3);
            background: rgba(30, 30, 38, 0.8);
            color: var(--text);
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: clamp(15px, 2.5vw, 17px);
            text-align: center;
            letter-spacing: 0.5px;
            transition: all 0.35s ease;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .question-input::placeholder {
            color: rgba(180, 160, 130, 0.5);
            font-style: italic;
        }
        .question-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(201, 168, 76, 0.2), 0 0 60px rgba(201, 168, 76, 0.08);
            background: rgba(35, 35, 44, 0.9);
        }
        .btn-answer {
            padding: 14px 44px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #5c3a1e 0%, #7a4f2e 40%, #8b5e3c 60%, #6b4226 100%);
            color: #e0c46d;
            font-family: 'Cinzel Decorative', 'Georgia', serif;
            font-weight: 700;
            font-size: clamp(14px, 2.2vw, 16px);
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 30px rgba(201, 168, 76, 0.1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-answer:hover {
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5), 0 0 45px rgba(201, 168, 76, 0.25);
            transform: translateY(-2px);
            color: #f0d878;
        }
        .btn-answer:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.1s ease;
        }
        .btn-answer:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .btn-answer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .btn-answer:hover::after {
            opacity: 1;
        }

        /* Answer text below book */
        .answer-reveal {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-style: italic;
            font-size: clamp(16px, 3vw, 22px);
            color: var(--gold-bright);
            text-align: center;
            min-height: 40px;
            letter-spacing: 1px;
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(10px);
            padding: 0 10px;
        }
        .answer-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Toast for empty question */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(180, 50, 50, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 520px) {
            .book-scene {
                width: var(--book-width-mobile);
                height: var(--book-height-mobile);
            }
            .cover-ornament {
                width: 55%;
                height: 45%;
            }
            .cover-ornament::before,
            .cover-ornament::after {
                font-size: 18px;
                top: -10px;
            }
            .cover-ornament::after {
                bottom: -10px;
            }
            .cover-title {
                font-size: 10px;
                letter-spacing: 1px;
            }
            .front-cover::before {
                inset: 6px;
                border-width: 2px;
            }
            .front-cover::after {
                inset: 12px;
            }
            .back-cover::before {
                inset: 6px;
            }
            .back-cover::after {
                inset: 12px;
            }
            .btn-answer {
                padding: 12px 32px;
                font-size: 13px;
            }
            .question-input {
                padding: 12px 16px;
            }
        }
        @media (max-width: 380px) {
            .book-scene {
                width: 260px;
                height: 350px;
            }
            .cover-ornament {
                width: 50%;
                height: 40%;
            }
            .cover-ornament::before,
            .cover-ornament::after {
                font-size: 14px;
                top: -8px;
            }
            .cover-ornament::after {
                bottom: -8px;
            }
            .cover-title {
                font-size: 9px;
                letter-spacing: 1px;
            }
            .front-cover::before {
                inset: 5px;
                border-width: 1.5px;
            }
            .front-cover::after {
                inset: 9px;
            }
            .flipping-page .page-content {
                font-size: 11px;
                padding: 8px;
            }
            .answer-display {
                font-size: 10px;
            }
        }
        @media (min-width: 768px) {
            .book-scene {
                width: var(--book-width-tablet);
                height: var(--book-height-tablet);
            }
        }
        @media (min-width: 1024px) {
            .book-scene {
                width: var(--book-width);
                height: var(--book-height);
            }
        }
    </style>
</head>
<body>

    <!-- Floating particles -->

            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const bookScene = document.getElementById('bookScene');
            const book = document.getElementById('book');
            const frontCover = document.getElementById('frontCover');
            const flippingPage = document.getElementById('flippingPage');
            const pageContent = document.getElementById('pageContent');
            const pageNumber = document.getElementById('pageNumber');
            const answerDisplay = document.getElementById('answerDisplay');
            const answerReveal = document.getElementById('answerReveal');
            const questionInput = document.getElementById('questionInput');
            const btnAnswer = document.getElementById('btnAnswer');
            const toast = document.getElementById('toast');
            const pageStack = document.getElementById('pageStack');
            const pageStackLeft = document.getElementById('pageStackLeft');

            // ─────────────────────────────────────
            // STATE
            // ─────────────────────────────────────
            let lastAnswerIndex = -1;
            let isAnimating = false;
            let bookOpen = false;
            let currentFlippedPages = 0;
            let animationTimeoutIds = [];

            // ─────────────────────────────────────
            // FUNCTIONS
            // ─────────────────────────────────────
            function getRandomAnswerIndex() {
                let idx;
                do {
                    idx = Math.floor(Math.random() * answers.length);
                } while (idx === lastAnswerIndex && answers.length > 1);
                lastAnswerIndex = idx;
                return idx;
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2200);
            }

            function resetBookState() {
                // Clear any pending timeouts
                animationTimeoutIds.forEach(id => clearTimeout(id));
                animationTimeoutIds = [];
                isAnimating = false;
                bookOpen = false;
                currentFlippedPages = 0;

                // Reset classes
                book.classList.remove('open');
                frontCover.classList.remove('open');
                flippingPage.classList.remove('flipped', 'slow-flip', 'very-slow-flip', 'show-answer');
                answerDisplay.classList.remove('visible');
                answerReveal.classList.remove('visible');
                pageContent.textContent = '';
                pageNumber.textContent = '';
                answerDisplay.textContent = '';
                answerReveal.textContent = '';
                flippingPage.style.display = 'block';
                flippingPage.style.transform = 'rotateY(0deg)';
                flippingPage.style.zIndex = '25';
                pageContent.style.opacity = '0';

                // Reset page stacks visibility
                pageStack.style.opacity = '1';
                pageStackLeft.style.opacity = '0.7';
            }

            function animateBookOpening(targetAnswerIndex, callback) {
                const totalFlips = 18 + Math.floor(Math.random() * 12); // 18-29 flips
                let flipCount = 0;
                const targetFlip = totalFlips;
                const answerText = answers[targetAnswerIndex];

                // Open the front cover
                frontCover.classList.add('open');
                book.classList.add('open');

                // After cover starts opening, begin page flips
                const coverOpenDelay = 400;

                animationTimeoutIds.push(setTimeout(() => {
                    flippingPage.style.display = 'block';
                    flippingPage.style.transform = 'rotateY(0deg)';
                    flippingPage.style.zIndex = '25';
                    flippingPage.classList.remove('flipped', 'slow-flip', 'very-slow-flip',
                        'show-answer');
                    pageContent.style.opacity = '0';
                    pageContent.textContent = '';
                    pageNumber.textContent = '';

                    // Update left stack to show accumulated pages
                    updatePageStacks(0);

                    performFlip(0, totalFlips, answerText, callback);
                }, coverOpenDelay));
            }

            function performFlip(currentFlip, totalFlips, answerText, callback) {
                if (currentFlip >= totalFlips) {
                    // Final flip - show answer
                    finishAnimation(answerText, callback);
                    return;
                }

                const remainingFlips = totalFlips - currentFlip;
                const progress = currentFlip / totalFlips;

                // Calculate delay for this flip
                let delay;
                if (progress < 0.5) {
                    // Fast riffling: 50-80ms
                    delay = 50 + Math.random() * 30;
                } else if (progress < 0.75) {
                    // Slowing down: 80-180ms
                    delay = 80 + (progress - 0.5) * 400;
                } else if (progress < 0.9) {
                    // Slower: 180-350ms
                    delay = 180 + (progress - 0.75) * 680;
                } else {
                    // Very slow final flips: 350-600ms
                    delay = 350 + (progress - 0.9) * 2500;
                }

                // Add slight randomness
                delay *= (0.85 + Math.random() * 0.3);

                animationTimeoutIds.push(setTimeout(() => {
                    // Reset the flipping page to right side
                    flippingPage.classList.remove('flipped', 'slow-flip', 'very-slow-flip',
                        'show-answer');
                    flippingPage.style.transform = 'rotateY(0deg)';
                    flippingPage.style.zIndex = '25';
                    pageContent.style.opacity = '0';

                    // Show random snippet during riffling
                    if (remainingFlips > 3) {
                        const snippetIdx = Math.floor(Math.random() * answers.length);
                        pageContent.textContent = answers[snippetIdx].length > 50 ?
                            answers[snippetIdx].substring(0, 45) + '...' :
                            answers[snippetIdx];
                        pageNumber.textContent = Math.floor(Math.random() * 700) + 1;
                    } else if (remainingFlips > 1) {
                        pageContent.textContent = '...';
                        pageNumber.textContent = '';
                    } else {
                        pageContent.textContent = '';
                        pageNumber.textContent = '';
                    }

                    // Small delay to let the page settle on the right
                    animationTimeoutIds.push(setTimeout(() => {
                        // Determine flip speed class
                        let speedClass = '';
                        if (remainingFlips <= 2) {
                            speedClass = 'very-slow-flip';
                        } else if (remainingFlips <= 5) {
                            speedClass = 'slow-flip';
                        }

                        // Execute the flip
                        if (speedClass) {
                            flippingPage.classList.add(speedClass);
                        }
                        flippingPage.classList.add('flipped');
                        flippingPage.style.transform = 'rotateY(-175deg)';

                        // Update page stacks to show riffling progress
                        updatePageStacks(currentFlip + 1);

                        // After flip completes, move to next
                        const flipDuration = remainingFlips <= 2 ? 600 :
                            remainingFlips <= 5 ? 350 : 150;

                        animationTimeoutIds.push(setTimeout(() => {
                            // Move flipped page to left side conceptually
                            flippingPage.style.zIndex = '3';
                            currentFlippedPages++;

                            // Continue to next flip
                            performFlip(currentFlip + 1, totalFlips,
                                answerText, callback);
                        }, flipDuration));
                    }, 20));
                }, delay));
            }

            function updatePageStacks(flippedCount) {
                // As pages flip, the right stack thins and left stack grows
                const rightOpacity = Math.max(0.3, 1 - (flippedCount / 25));
                const leftOpacity = Math.min(0.9, 0.3 + (flippedCount / 25));
                pageStack.style.opacity = rightOpacity;
                pageStackLeft.style.opacity = leftOpacity;
            }

            function finishAnimation(answerText, callback) {
                // Show answer on the flipping page
                flippingPage.classList.remove('flipped', 'slow-flip', 'very-slow-flip');
                flippingPage.style.transform = 'rotateY(0deg)';
                flippingPage.style.zIndex = '25';
                flippingPage.classList.add('show-answer');
                pageContent.textContent = answerText;
                pageContent.style.opacity = '1';
                pageNumber.textContent = '';

                // Also show on left spread
                answerDisplay.textContent = answerText;
                answerDisplay.classList.add('visible');

                // Show below book
                answerReveal.textContent = '✦ ' + answerText + ' ✦';
                answerReveal.classList.add('visible');

                // Update stacks
                pageStack.style.opacity = '0.3';
                pageStackLeft.style.opacity = '0.9';
                updatePageStacks(25);

                // Book is now open
                bookOpen = true;
                isAnimating = false;
                btnAnswer.disabled = false;
                btnAnswer.textContent = '✧ Reveal Answer ✧';

                if (callback) callback();
            }

            function closeBook(callback) {
                // Close the cover and reset
                frontCover.classList.remove('open');
                book.classList.remove('open');
                flippingPage.classList.remove('flipped', 'slow-flip', 'very-slow-flip',
                'show-answer');
                flippingPage.style.transform = 'rotateY(0deg)';
                flippingPage.style.zIndex = '25';
                flippingPage.style.display = 'block';
                pageContent.style.opacity = '0';
                pageContent.textContent = '';
                pageNumber.textContent = '';
                answerDisplay.classList.remove('visible');
                answerDisplay.textContent = '';
                answerReveal.classList.remove('visible');
                answerReveal.textContent = '';
                pageStack.style.opacity = '1';
                pageStackLeft.style.opacity = '0.7';
                bookOpen = false;
                currentFlippedPages = 0;
                updatePageStacks(0);

                setTimeout(() => {
                    if (callback) callback();
                }, 500);
            }

            function handleAnswerRequest() {
                if (isAnimating) return;

                const question = questionInput.value.trim();
                if (!question) {
                    showToast('Please ask a question first...');
                    questionInput.focus();
                    // Shake the input
                    questionInput.style.animation = 'none';
                    questionInput.offsetHeight; // trigger reflow
                    questionInput.style.animation = 'shake 0.5s ease';
                    return;
                }

                isAnimating = true;
                btnAnswer.disabled = true;
                btnAnswer.textContent = '⏳ Opening...';

                // Clear previous answer
                answerDisplay.classList.remove('visible');
                answerReveal.classList.remove('visible');
                answerDisplay.textContent = '';
                answerReveal.textContent = '';

                const targetIndex = getRandomAnswerIndex();

                if (bookOpen) {
                    // Close book first, then reopen
                    closeBook(() => {
                        resetBookState();
                        // Small delay before reopening
                        setTimeout(() => {
                            animateBookOpening(targetIndex, () => {
                                // Animation complete
                            });
                        }, 300);
                    });
                } else {
                    // Book is closed, open it
                    resetBookState();
                    animateBookOpening(targetIndex, () => {
                        // Animation complete
                    });
                }
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            btnAnswer.addEventListener('click', handleAnswerRequest);

            questionInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleAnswerRequest();
                }
            });

            // Click on front cover to close the book (when open and not animating)
            frontCover.addEventListener('click', () => {
                if (bookOpen && !isAnimating) {
                    isAnimating = true;
                    btnAnswer.disabled = true;
                    btnAnswer.textContent = '⏳ Closing...';
                    closeBook(() => {
                        resetBookState();
                        isAnimating = false;
                        btnAnswer.disabled = false;
                        btnAnswer.textContent = '✧ Reveal Answer ✧';
                    });
                }
            });

            // Add shake animation keyframes dynamically
            const shakeStyle = document.createElement('style');
            shakeStyle.textContent = `
                @keyframes shake {
                    0%,100% { transform: translateX(0); }
                    10%,50%,90% { transform: translateX(-6px); }
                    30%,70% { transform: translateX(6px); }
                    20%,40%,60%,80% { transform: translateX(-4px); }
                }
            `;
            document.head.appendChild(shakeStyle);

            // ─────────────────────────────────────
            // INITIAL SETUP
            // ─────────────────────────────────────
            resetBookState();
            flippingPage.style.display = 'block';
            flippingPage.style.transform = 'rotateY(0deg)';
            pageContent.style.opacity = '0';
            pageContent.textContent = '';
            pageNumber.textContent = '';
            updatePageStacks(0);

            // Focus input on load
            setTimeout(() => {
                questionInput.focus();
            }, 600);

            console.log('📖 Book of ANSWERS ready.');
            console.log('   ' + answers.length + ' answers loaded.');
            console.log('   Ask your question and open the book...');
        })();
    </script>
